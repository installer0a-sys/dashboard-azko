<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu 1 - Aplikasi Apps Script</title>
    
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Font Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }

</head>
<body class="h-screen flex flex-col bg-slate-50 overflow-hidden m-0">

    <div class="bg-white shadow-sm py-4 px-5 flex items-center z-10 w-full">

            &larr; Kembali
        </a>
        <div class="ml-4 text-base font-semibold text-slate-700">
            Data Instalasi
        </div>
    </div>

    <!-- Iframe Container -->
    <div class="flex-grow w-full relative">
        <!-- Pastikan mengganti URL src di bawah -->
        <iframe 
            src="URL_WEB_APP_GOOGLE_APPS_SCRIPT_ANDA_DISINI" 
            class="absolute top-0 left-0 w-full h-full border-none">
        </iframe>
    </div>

</body>
</html>
